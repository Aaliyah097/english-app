  <text
    x="256"
    y="370"
    font-family="'Newsreader', 'Iowan Old Style', Georgia, serif"
    font-style="italic"
    font-weight="500"
    font-size="360"
    text-anchor="middle"
    fill="#1a1a1a"
  >E</text>
</svg>
